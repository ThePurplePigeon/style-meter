name: Bug report
description: Report a Style Meter problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include enough detail to reproduce the issue.
  - type: input
    id: version
    attributes:
      label: Plugin version
      description: The version shown in Dalamud, if known.
      placeholder: "0.1.0"
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the issue.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps, job, duty/content, and actions used.
      placeholder: |
        1. Change to ...
        2. Use ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant Dalamud log lines. Use `/stylemeter diag` first if useful.
      render: text
